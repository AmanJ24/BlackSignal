<!DOCTYPE html>
<html lang="en" class="h-full bg-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dark Web OSINT Pipeline{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">

    <style>
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full">
    <div class="min-h-full">
        <nav class="bg-white border-b border-gray-200">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="flex h-16 justify-between">
                    <div class="flex">
                        <div class="flex flex-shrink-0 items-center">
                            <span class="text-xl font-semibold text-gray-900">Dark Web OSINT Pipeline</span>
                        </div>
                        <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                            <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %} inline-flex items-center border-b-2 px-1 pt-1 text-sm font-medium">
                                Dashboard
                            </a>
                            <a href="/pipeline" class="nav-link {% if request.path == '/pipeline' %}active{% endif %} inline-flex items-center border-b-2 px-1 pt-1 text-sm font-medium">
                                Pipeline
                            </a>
                            <a href="/results" class="nav-link {% if request.path == '/results' %}active{% endif %} inline-flex items-center border-b-2 px-1 pt-1 text-sm font-medium">
                                Results
                            </a>
                            <a href="/logs" class="nav-link {% if request.path == '/logs' %}active{% endif %} inline-flex items-center border-b-2 px-1 pt-1 text-sm font-medium">
                                Logs
                            </a>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <button onclick="populateMockData()" class="mr-4 text-xs text-gray-500 hover:text-gray-700 border border-gray-300 px-3 py-1 rounded">
                            Load Mock Data
                        </button>
                        <div class="flex items-center space-x-2">
                            <div class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></div>
                            <span class="text-sm text-gray-500">Connected</span>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <main>
            <div class="mx-auto max-w-7xl py-6 sm:px-6 lg:px-8">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    {% block scripts %}{% endblock %}

    <script>
        lucide.createIcons();

        const style = document.createElement('style');
        style.textContent = `
            .nav-link { border-color: transparent; color: rgb(107, 114, 128); transition: all 0.2s; }
            .nav-link:hover { border-color: rgb(209, 213, 219); color: rgb(17, 24, 39); }
            .nav-link.active { border-color: rgb(14, 165, 233); color: rgb(14, 165, 233); }
        `;
        document.head.appendChild(style);

        async function populateMockData() {
            try {
                const response = await fetch('/api/mock/populate', { method: 'POST' });
                const data = await response.json();
                alert('Mock data loaded successfully! Refresh the page to see results.');
                location.reload();
            } catch (error) {
                console.error('Error loading mock data:', error);
                alert('Failed to load mock data');
            }
        }
    </script>
</body>
</html>
