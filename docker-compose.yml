services:
  tor:
    build:
      context: .
      dockerfile: Dockerfile.tor
    container_name: blacksignal-tor
    ports:
      - "9050:9050"
      - "9051:9051"
    healthcheck:
      test: ["CMD-SHELL", "echo 'GETINFO status/circuit-established' | nc -w 2 127.0.0.1 9051 || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  app:
    build: .
    container_name: blacksignal-app
    depends_on:
      tor:
        condition: service_healthy
    environment:
      - TOR_SOCKS_HOST=tor
      - TOR_SOCKS_PORT=9050
      - TOR_CONTROL_PORT=9051
      - TOR_PASSWORD=${TOR_PASSWORD:-TorRelay123}
      - ALLOW_CLEARNET_FALLBACK=${ALLOW_CLEARNET_FALLBACK:-True}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY}
      - SHODAN_API_KEY=${SHODAN_API_KEY}
      - FLASK_ENV=${FLASK_ENV:-development}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-blacksignal-secret}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8080}
      - DASHBOARD_USER=${DASHBOARD_USER}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: on-failure
    command: python web/app.py

  pipeline:
    build: .
    container_name: blacksignal-pipeline
    depends_on:
      tor:
        condition: service_healthy
    environment:
      - TOR_SOCKS_HOST=tor
      - TOR_SOCKS_PORT=9050
      - TOR_CONTROL_PORT=9051
      - TOR_PASSWORD=${TOR_PASSWORD:-TorRelay123}
      - ALLOW_CLEARNET_FALLBACK=${ALLOW_CLEARNET_FALLBACK:-True}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY}
      - SHODAN_API_KEY=${SHODAN_API_KEY}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    # Starts the pipeline once; run manually or set up a cron
    command: python orchestration/run_pipeline.py
    profiles: ["pipeline-run"]
